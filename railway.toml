[build]
builder = "NIXPACKS"

[deploy]
# NOTA: o Nixpacks usa `cd backend &&` (nixpacks.toml),
# então railway.toml também parte de backend/ para consistência
startCommand = "mkdir -p data logs && cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT"
healthcheckPath = "/"
healthcheckTimeout = 60
