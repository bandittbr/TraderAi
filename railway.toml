[build]
builder = "NIXPACKS"

[deploy]
# Nixpacks detecta o projeto Python em backend/ como raiz,
# então NÃO usar cd backend — os arquivos já estão na raiz.
# Nem "python3" nem "uvicorn" existem no PATH desse builder Nix — só "pip".
# Localiza o interpretador python3.XX direto no /nix/store (mais robusto do
# que tentar interpretar o wrapper do pip) e chama "$PYBIN -m uvicorn" nele.
#
# PLAYWRIGHT_BROWSERS_PATH=0 precisa estar explícito AQUI também: o
# [variables] do nixpacks.toml não garante que a env var chegue no processo
# de runtime quando o startCommand vem do railway.toml (ele sobrescreve o
# [start] do nixpacks). Sem isso, Playwright volta a procurar o Chromium em
# ~/.cache/ms-playwright (que não existe em runtime) e cai sempre no
# fallback PIL — foi exatamente o erro visto nos logs: "BrowserType.launch:
# Executable doesn't exist at /root/.cache/ms-playwright/...".
startCommand = 'mkdir -p data logs && PYBIN=$(find /nix/store -type f \( -name "python3.[0-9]" -o -name "python3.[0-9][0-9]" \) -path "*/bin/*" 2>/dev/null | head -1) && PLAYWRIGHT_BROWSERS_PATH=0 "$PYBIN" -m uvicorn app.main:app --host 0.0.0.0 --port $PORT'
healthcheckPath = "/"
healthcheckTimeout = 60
