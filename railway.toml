[build]
builder = "NIXPACKS"

[deploy]
# Nixpacks detecta o projeto Python em backend/ como raiz,
# então NÃO usar cd backend — os arquivos já estão na raiz.
# Nem "python3" nem "uvicorn" existem no PATH desse builder Nix — só "pip".
# O "pip" aqui é um wrapper nix (shebang é bash, não python), então
# procuramos dentro do próprio wrapper pelo caminho real do interpretador
# python3 que ele invoca internamente, e chamamos "$PYBIN -m uvicorn" nele.
startCommand = 'mkdir -p data logs && PYBIN=$(grep -m1 -oE "/nix/store/[^ ]+/bin/python3(\.[0-9]+)?" "$(command -v pip)") && "$PYBIN" -m uvicorn app.main:app --host 0.0.0.0 --port $PORT'
healthcheckPath = "/"
healthcheckTimeout = 60
