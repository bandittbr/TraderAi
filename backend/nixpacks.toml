[phases.setup]
# nixPkgs custom some soma ao setup auto-detectado (que já traz python3 +
# gcc), mas o python3 puro do nixpkgs não inclui pip — sem isso o comando
# "pip install" da fase seguinte falha com "pip: command not found".
nixPkgs = ["python3Packages.pip"]
aptPkgs = [
  "libnss3", "libnspr4", "libatk1.0-0", "libatk-bridge2.0-0", "libcups2",
  "libdrm2", "libxkbcommon0", "libxcomposite1", "libxdamage1", "libxfixes3",
  "libxrandr2", "libgbm1", "libasound2t64", "libpango-1.0-0", "libcairo2",
  "ffmpeg", "fonts-noto-color-emoji"
]

# PLAYWRIGHT_BROWSERS_PATH=0 força os browsers a instalar DENTRO do pacote
# playwright (site-packages/.../driver/package/.local-browsers) em vez de
# ~/.cache/ms-playwright, evitando mismatch de $HOME entre build e runtime.
[variables]
PLAYWRIGHT_BROWSERS_PATH = "0"

[phases.install]
# Nem "python3" nem "playwright" existem no PATH desse builder — só "pip".
# Localizamos o interpretador python3.XX direto no /nix/store. Cuidado: o
# padrão "python3.[0-9]*" é ganancioso demais e também casa com
# "python3.12-config" (um utilitário de build, não o interpretador) — que
# aparecia ANTES do "python3.12" real na busca e quebrava tudo silenciosamente
# (rodava "python3.12-config -m playwright ..." e só imprimia o usage dele).
# Os dois padrões exatos abaixo (1 ou 2 dígitos de versão, sem sufixo) evitam
# esse falso-positivo.
cmds = [
  'pip install --break-system-packages -r requirements.txt && PYBIN=$(find /nix/store -type f \( -name "python3.[0-9]" -o -name "python3.[0-9][0-9]" \) -path "*/bin/*" 2>/dev/null | head -1) && PLAYWRIGHT_BROWSERS_PATH=0 "$PYBIN" -m playwright install --with-deps chromium && PLAYWRIGHT_BROWSERS_PATH=0 "$PYBIN" -m playwright install --with-deps chromium-headless-shell'
]

[start]
# Mesma técnica de phases.install — "python3"/"uvicorn" não existem no PATH
# em runtime também. Localiza o interpretador direto no /nix/store.
# PLAYWRIGHT_BROWSERS_PATH=0 precisa vir explícito aqui também — [variables]
# não garante propagação pro processo de runtime nesse builder, então sem
# isso o Playwright volta a procurar em ~/.cache/ms-playwright e falha.
cmd = 'mkdir -p data logs && PYBIN=$(find /nix/store -type f \( -name "python3.[0-9]" -o -name "python3.[0-9][0-9]" \) -path "*/bin/*" 2>/dev/null | head -1) && PLAYWRIGHT_BROWSERS_PATH=0 "$PYBIN" -m uvicorn app.main:app --host 0.0.0.0 --port $PORT'
