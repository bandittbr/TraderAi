[phases.setup]
# nixPkgs custom soma ao setup auto-detectado (que já traz python3 +
# gcc), mas o python3 puro do nixpkgs não inclui pip — sem isso o comando
# "pip install" da fase seguinte falha com "pip: command not found".
nixPkgs = ["python3Packages.pip"]
aptPkgs = [
  "libnss3", "libnspr4", "libatk1.0-0", "libatk-bridge2.0-0", "libcups2",
  "libdrm2", "libxkbcommon0", "libxcomposite1", "libxdamage1", "libxfixes3",
  "libxrandr2", "libgbm1", "libasound2t64", "libpango-1.0-0", "libcairo2",
  "ffmpeg", "fonts-noto-color-emoji"
]

# PLAYWRIGHT_BROWSERS_PATH=0 força os browsers a instalar DENTRO do pacote
# playwright (site-packages/.../driver/package/.local-browsers) em vez de
# ~/.cache/ms-playwright, evitando mismatch de $HOME entre build e runtime.
[variables]
PLAYWRIGHT_BROWSERS_PATH = "0"

[phases.install]
# Um único comando encadeado com "&&" (em vez de itens separados no array):
# cada item do array "cmds" parece rodar em uma invocação de shell própria
# nesse builder, perdendo o PATH resolvido (python3/pip) entre um item e o
# próximo — foi assim que "pip install" funcionou mas o passo seguinte
# ("python3 -m playwright") deu "python3: command not found" mesmo python3
# tendo acabado de rodar o pip. Encadear em um shell só evita isso.
cmds = [
  "pip install --break-system-packages -r requirements.txt && PLAYWRIGHT_BROWSERS_PATH=0 python3 -m playwright install --with-deps chromium && PLAYWRIGHT_BROWSERS_PATH=0 python3 -m playwright install --with-deps chromium-headless-shell"
]

[start]
# python3 -m uvicorn (não "uvicorn" puro) pelo mesmo motivo do playwright
# acima: o executável do pip install --break-system-packages não fica no
# PATH nesse ambiente, só o módulo é garantido de estar acessível.
cmd = "mkdir -p data logs && python3 -m uvicorn app.main:app --host 0.0.0.0 --port $PORT"
