[phases.setup]
# nixPkgs custom soma ao setup auto-detectado (que já traz python3 +
# gcc), mas o python3 puro do nixpkgs não inclui pip — sem isso o comando
# "pip install" da fase seguinte falha com "pip: command not found".
nixPkgs = ["python3Packages.pip"]
aptPkgs = [
  "libnss3", "libnspr4", "libatk1.0-0", "libatk-bridge2.0-0", "libcups2",
  "libdrm2", "libxkbcommon0", "libxcomposite1", "libxdamage1", "libxfixes3",
  "libxrandr2", "libgbm1", "libasound2t64", "libpango-1.0-0", "libcairo2",
  "ffmpeg", "fonts-noto-color-emoji"
]

# PLAYWRIGHT_BROWSERS_PATH=0 força os browsers a instalar DENTRO do pacote
# playwright (site-packages/.../driver/package/.local-browsers) em vez de
# ~/.cache/ms-playwright, evitando mismatch de $HOME entre build e runtime.
[variables]
PLAYWRIGHT_BROWSERS_PATH = "0"

[phases.install]
cmds = [
  # --break-system-packages: o python3 vem do Nix (/nix/store, imutável) e o
  # pip recusa instalar no ambiente global por padrão (PEP 668). O provider
  # Python auto-detectado do Nixpacks normalmente usa uma venv pra evitar
  # isso; como definimos install manualmente, contornamos com essa flag.
  "pip install --break-system-packages -r requirements.txt",
  "PLAYWRIGHT_BROWSERS_PATH=0 playwright install --with-deps chromium",
  "PLAYWRIGHT_BROWSERS_PATH=0 playwright install --with-deps chromium-headless-shell",
]

[start]
cmd = "mkdir -p data logs && uvicorn app.main:app --host 0.0.0.0 --port $PORT"
