[phases.setup]
# nixPkgs custom soma ao setup auto-detectado (que já traz python3 +
# gcc), mas o python3 puro do nixpkgs não inclui pip — sem isso o comando
# "pip install" da fase seguinte falha com "pip: command not found".
nixPkgs = ["python3Packages.pip"]
aptPkgs = [
  "libnss3", "libnspr4", "libatk1.0-0", "libatk-bridge2.0-0", "libcups2",
  "libdrm2", "libxkbcommon0", "libxcomposite1", "libxdamage1", "libxfixes3",
  "libxrandr2", "libgbm1", "libasound2t64", "libpango-1.0-0", "libcairo2",
  "ffmpeg", "fonts-noto-color-emoji"
]

# PLAYWRIGHT_BROWSERS_PATH=0 força os browsers a instalar DENTRO do pacote
# playwright (site-packages/.../driver/package/.local-browsers) em vez de
# ~/.cache/ms-playwright, evitando mismatch de $HOME entre build e runtime.
[variables]
PLAYWRIGHT_BROWSERS_PATH = "0"

[phases.install]
# Nem "python3" nem "playwright" existem no PATH desse builder — só "pip".
# O shebang do "pip" aqui NÃO é um python (é um wrapper nix, primeira linha
# "#!/nix/store/.../bin/bash -e"), então extrair a 1ª linha não serve. Em
# vez disso, procuramos dentro do próprio wrapper por qualquer caminho
# "/nix/store/.../bin/python3(.XX)?" que ele referencia internamente (linha
# "exec .../python3.XX ...") e usamos esse interpretador real diretamente.
cmds = [
  'pip install --break-system-packages -r requirements.txt && PYBIN=$(grep -m1 -oE "/nix/store/[^ ]+/bin/python3(\.[0-9]+)?" "$(command -v pip)") && PLAYWRIGHT_BROWSERS_PATH=0 "$PYBIN" -m playwright install --with-deps chromium && PLAYWRIGHT_BROWSERS_PATH=0 "$PYBIN" -m playwright install --with-deps chromium-headless-shell'
]

[start]
# Mesma técnica de phases.install (grep dentro do wrapper do pip) — "python3"
# e "uvicorn" não existem no PATH desse ambiente em runtime também.
cmd = 'mkdir -p data logs && PYBIN=$(grep -m1 -oE "/nix/store/[^ ]+/bin/python3(\.[0-9]+)?" "$(command -v pip)") && "$PYBIN" -m uvicorn app.main:app --host 0.0.0.0 --port $PORT'
