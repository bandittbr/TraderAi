[phases.setup]
# nixPkgs custom soma ao setup auto-detectado (que já traz python3 +
# gcc), mas o python3 puro do nixpkgs não inclui pip — sem isso o comando
# "pip install" da fase seguinte falha com "pip: command not found".
nixPkgs = ["python3Packages.pip"]
aptPkgs = [
  "libnss3", "libnspr4", "libatk1.0-0", "libatk-bridge2.0-0", "libcups2",
  "libdrm2", "libxkbcommon0", "libxcomposite1", "libxdamage1", "libxfixes3",
  "libxrandr2", "libgbm1", "libasound2t64", "libpango-1.0-0", "libcairo2",
  "ffmpeg", "fonts-noto-color-emoji"
]

# PLAYWRIGHT_BROWSERS_PATH=0 força os browsers a instalar DENTRO do pacote
# playwright (site-packages/.../driver/package/.local-browsers) em vez de
# ~/.cache/ms-playwright, evitando mismatch de $HOME entre build e runtime.
[variables]
PLAYWRIGHT_BROWSERS_PATH = "0"

[phases.install]
# Nem "python3" nem "playwright" existem no PATH desse builder — só "pip".
# Já tentamos ler o shebang/conteúdo do wrapper do pip pra achar o
# interpretador (deu errado — o wrapper provavelmente delega pra outro
# arquivo interno em vez de referenciar python3 diretamente em texto). Em
# vez de depender da implementação do wrapper, procuramos o binário
# python3.XX direto no /nix/store — ele com certeza existe em algum
# diretório bin/ ali, já que "pip" só roda porque um python o executa.
cmds = [
  'pip install --break-system-packages -r requirements.txt && PYBIN=$(find /nix/store -type f -name "python3.[0-9]*" -path "*/bin/*" 2>/dev/null | head -1) && PLAYWRIGHT_BROWSERS_PATH=0 "$PYBIN" -m playwright install --with-deps chromium && PLAYWRIGHT_BROWSERS_PATH=0 "$PYBIN" -m playwright install --with-deps chromium-headless-shell'
]

[start]
# Mesma técnica de phases.install — "python3"/"uvicorn" não existem no PATH
# em runtime também. Localiza o interpretador direto no /nix/store.
cmd = 'mkdir -p data logs && PYBIN=$(find /nix/store -type f -name "python3.[0-9]*" -path "*/bin/*" 2>/dev/null | head -1) && "$PYBIN" -m uvicorn app.main:app --host 0.0.0.0 --port $PORT'
