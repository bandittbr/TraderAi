[phases.setup]
# nixPkgs custom soma ao setup auto-detectado (que já traz python3 +
# gcc), mas o python3 puro do nixpkgs não inclui pip — sem isso o comando
# "pip install" da fase seguinte falha com "pip: command not found".
nixPkgs = ["python3Packages.pip"]
aptPkgs = [
  "libnss3", "libnspr4", "libatk1.0-0", "libatk-bridge2.0-0", "libcups2",
  "libdrm2", "libxkbcommon0", "libxcomposite1", "libxdamage1", "libxfixes3",
  "libxrandr2", "libgbm1", "libasound2t64", "libpango-1.0-0", "libcairo2",
  "ffmpeg", "fonts-noto-color-emoji"
]

# PLAYWRIGHT_BROWSERS_PATH=0 força os browsers a instalar DENTRO do pacote
# playwright (site-packages/.../driver/package/.local-browsers) em vez de
# ~/.cache/ms-playwright, evitando mismatch de $HOME entre build e runtime.
[variables]
PLAYWRIGHT_BROWSERS_PATH = "0"

[phases.install]
# Nem "python3" nem "playwright" (executáveis) existem no PATH desse builder
# — só "pip" está linkado (via nixPkgs acima). Mas "pip" É um script Python,
# e seu shebang (#!/nix/store/.../bin/pythonX.Y) aponta pro interpretador
# exato usado — extraímos esse caminho absoluto e chamamos "$PYBIN -m X"
# diretamente, sem depender de nenhum nome estar no PATH.
cmds = [
  'pip install --break-system-packages -r requirements.txt && PYBIN=$(head -1 "$(command -v pip)" | sed "s/^#!//") && PLAYWRIGHT_BROWSERS_PATH=0 "$PYBIN" -m playwright install --with-deps chromium && PLAYWRIGHT_BROWSERS_PATH=0 "$PYBIN" -m playwright install --with-deps chromium-headless-shell'
]

[start]
# Mesmo truque do shebang do pip (ver phases.install) — "python3"/"uvicorn"
# não existem no PATH desse ambiente em runtime também.
cmd = 'mkdir -p data logs && PYBIN=$(head -1 "$(command -v pip)" | sed "s/^#!//") && "$PYBIN" -m uvicorn app.main:app --host 0.0.0.0 --port $PORT'
