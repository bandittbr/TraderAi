<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px; height: 1920px;
    font-family: 'Inter', 'Arial Black', sans-serif;
    background: #0a0f1a;
    color: #fff;
    overflow: hidden;
    position: relative;
  }
  .bg-gradient {
    position: absolute; inset: 0;
    background: linear-gradient(160deg, #0a1628 0%, #0d0d0d 50%, #0a1a2e 100%);
  }
  .bg-accent {
    position: absolute; inset: 0;
    background:
      radial-gradient(ellipse at 50% 0%, rgba(0,212,255,0.12) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 100%, rgba(0,100,200,0.08) 0%, transparent 50%);
  }
  /* Scanline effect */
  .scanlines {
    position: absolute; inset: 0;
    background: repeating-linear-gradient(
      0deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px
    );
    pointer-events: none;
  }
  .content {
    position: relative; z-index: 2;
    display: flex; flex-direction: column;
    height: 100%; padding: 80px 60px;
  }

  /* Breaking news banner */
  .breaking-banner {
    background: linear-gradient(90deg, #FF0000, #CC0000);
    color: #fff;
    font-size: 28px; font-weight: 900;
    padding: 18px 0;
    text-align: center;
    letter-spacing: 6px;
    text-transform: uppercase;
    margin-top: 100px;
    position: relative;
  }
  .breaking-banner::before,
  .breaking-banner::after {
    content: '●';
    margin: 0 15px;
    font-size: 16px;
    vertical-align: middle;
  }

  /* Headline */
  .headline-section {
    flex: 0 0 auto;
    text-align: center;
    margin-top: 50px;
    padding: 0 20px;
  }
  .headline {
    font-size: 56px; font-weight: 900;
    line-height: 1.15;
    color: #fff;
    text-transform: uppercase;
    letter-spacing: -1px;
  }
  .headline .symbol {
    color: #00D4FF;
    font-size: 64px;
  }

  /* Summary */
  .summary {
    font-size: 32px; font-weight: 400;
    color: rgba(255,255,255,0.75);
    text-align: center;
    margin-top: 30px;
    line-height: 1.4;
    padding: 0 30px;
  }

  /* Impact cards */
  .impacts {
    flex: 1 1 auto;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 24px;
    padding: 40px 0;
  }
  .impact-card {
    background: rgba(0,212,255,0.08);
    border: 1px solid rgba(0,212,255,0.2);
    border-radius: 20px;
    padding: 30px 40px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .impact-label {
    font-size: 28px; font-weight: 400;
    color: rgba(255,255,255,0.6);
    text-transform: uppercase;
    letter-spacing: 2px;
  }
  .impact-value {
    font-size: 38px; font-weight: 900;
    color: #00D4FF;
  }
  .impact-value.positive { color: #00FF88; }
  .impact-value.negative { color: #FF4444; }

  /* Source */
  .source-section {
    text-align: center;
    margin-top: 20px;
  }
  .source {
    font-size: 24px;
    color: rgba(255,255,255,0.4);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  /* CTA */
  .cta-section {
    flex: 0 0 auto;
    text-align: center;
    padding-bottom: 100px;
  }
  .cta-text {
    font-size: 36px; font-weight: 700;
    color: rgba(255,255,255,0.9);
  }
  .watermark {
    font-size: 24px; font-weight: 400;
    color: rgba(0,212,255,0.5);
    margin-top: 20px;
    letter-spacing: 3px;
  }
</style>
</head>
<body>
  <div class="bg-gradient"></div>
  <div class="bg-accent"></div>
  <div class="scanlines"></div>

  <div class="content">
    <div class="breaking-banner" data-scene="hook">BREAKING NEWS</div>

    <div class="headline-section" data-scene="hook">
      <div class="headline">{{HEADLINE}}</div>
      <div class="summary">{{SUMMARY}}</div>
    </div>

    <div class="impacts" data-scene="content">
      <div class="impact-card">
        <span class="impact-label">{{IMPACT_1_LABEL}}</span>
        <span class="impact-value {{IMPACT_1_CLASS}}">{{IMPACT_1_VALUE}}</span>
      </div>
      <div class="impact-card">
        <span class="impact-label">{{IMPACT_2_LABEL}}</span>
        <span class="impact-value {{IMPACT_2_CLASS}}">{{IMPACT_2_VALUE}}</span>
      </div>
      <div class="impact-card">
        <span class="impact-label">{{IMPACT_3_LABEL}}</span>
        <span class="impact-value {{IMPACT_3_CLASS}}">{{IMPACT_3_VALUE}}</span>
      </div>
    </div>

    <div class="source-section" data-scene="content">
      <div class="source">Fonte: {{SOURCE}}</div>
    </div>

    <div class="cta-section" data-scene="cta">
      <div class="cta-text">{{CTA}}</div>
      <div class="watermark">BIEL • TRADEAI</div>
    </div>
  </div>
</body>
</html>
