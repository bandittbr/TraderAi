<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px; height: 1920px;
    font-family: 'Inter', 'Arial Black', sans-serif;
    background: #1a0a0a;
    color: #fff;
    overflow: hidden;
    position: relative;
  }
  .bg-gradient {
    position: absolute; inset: 0;
    background: linear-gradient(160deg, #1a0d0d 0%, #0d0d0d 45%, #1a0a0a 100%);
  }
  .bg-accent {
    position: absolute; inset: 0;
    background:
      radial-gradient(circle at 40% 25%, rgba(255,68,68,0.1) 0%, transparent 50%),
      radial-gradient(circle at 60% 75%, rgba(255,100,68,0.06) 0%, transparent 50%);
  }
  .content {
    position: relative; z-index: 2;
    display: flex; flex-direction: column;
    height: 100%; padding: 80px 60px;
  }

  /* Header */
  .header {
    flex: 0 0 auto;
    text-align: center;
    margin-top: 120px;
  }
  .header-badge {
    display: inline-block;
    background: linear-gradient(135deg, #FF4444, #CC2200);
    color: #fff;
    font-size: 28px; font-weight: 900;
    padding: 14px 40px;
    border-radius: 50px;
    letter-spacing: 4px;
    text-transform: uppercase;
    margin-bottom: 30px;
  }
  .error-emoji {
    font-size: 100px;
    display: block;
    margin-bottom: 20px;
  }

  /* Title */
  .title-section {
    flex: 0 0 auto;
    text-align: center;
    margin-top: 30px;
    padding: 0 20px;
  }
  .title {
    font-size: 52px; font-weight: 900;
    line-height: 1.2;
    color: #FF4444;
    text-transform: uppercase;
  }
  .subtitle {
    font-size: 30px; font-weight: 400;
    color: rgba(255,255,255,0.6);
    margin-top: 16px;
    line-height: 1.4;
  }

  /* Error details */
  .error-details {
    flex: 1 1 auto;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 24px;
    padding: 40px 0;
  }
  .error-card {
    background: rgba(255,68,68,0.06);
    border: 1px solid rgba(255,68,68,0.15);
    border-radius: 24px;
    padding: 36px 40px;
  }
  .error-card-header {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 16px;
  }
  .error-card-icon {
    font-size: 36px;
  }
  .error-card-title {
    font-size: 30px; font-weight: 900;
    color: #FF4444;
    text-transform: uppercase;
  }
  .error-card-desc {
    font-size: 28px; font-weight: 400;
    color: rgba(255,255,255,0.7);
    line-height: 1.5;
  }

  /* Lesson */
  .lesson-section {
    flex: 0 0 auto;
    background: rgba(255,165,0,0.08);
    border: 1px solid rgba(255,165,0,0.2);
    border-radius: 20px;
    padding: 30px 40px;
    text-align: center;
    margin-top: 20px;
  }
  .lesson-label {
    font-size: 22px; font-weight: 700;
    color: rgba(255,165,0,0.7);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 12px;
  }
  .lesson-text {
    font-size: 32px; font-weight: 700;
    color: #FFA500;
    line-height: 1.3;
  }

  /* CTA */
  .cta-section {
    flex: 0 0 auto;
    text-align: center;
    padding-bottom: 100px;
    margin-top: 30px;
  }
  .cta-text {
    font-size: 36px; font-weight: 700;
    color: rgba(255,255,255,0.9);
  }
  .watermark {
    font-size: 24px; font-weight: 400;
    color: rgba(255,68,68,0.5);
    margin-top: 20px;
    letter-spacing: 3px;
  }
</style>
</head>
<body>
  <div class="bg-gradient"></div>
  <div class="bg-accent"></div>

  <div class="content">
    <div class="header" data-scene="hook">
      <span class="error-emoji">😅</span>
      <div class="header-badge">ERROS QUE APRENDEMOS</div>
    </div>

    <div class="title-section" data-scene="hook">
      <div class="title">{{TITLE}}</div>
      <div class="subtitle">{{SUBTITLE}}</div>
    </div>

    <div class="error-details" data-scene="content">
      <div class="error-card">
        <div class="error-card-header">
          <span class="error-card-icon">❌</span>
          <span class="error-card-title">{{ERROR_1_TITLE}}</span>
        </div>
        <div class="error-card-desc">{{ERROR_1_DESC}}</div>
      </div>
      <div class="error-card">
        <div class="error-card-header">
          <span class="error-card-icon">⚠️</span>
          <span class="error-card-title">{{ERROR_2_TITLE}}</span>
        </div>
        <div class="error-card-desc">{{ERROR_2_DESC}}</div>
      </div>
    </div>

    <div class="lesson-section" data-scene="content">
      <div class="lesson-label">Aprendizado</div>
      <div class="lesson-text">{{LESSON}}</div>
    </div>

    <div class="cta-section" data-scene="cta">
      <div class="cta-text">{{CTA}}</div>
      <div class="watermark">BIEL • TRADEAI</div>
    </div>
  </div>
</body>
</html>
