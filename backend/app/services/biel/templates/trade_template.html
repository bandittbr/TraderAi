<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1350px;
    background-color: #05080d;
    background-image: url('{{BG_IMAGE}}');
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    color: #ffffff;
    font-family: 'Inter', system-ui, sans-serif;
    padding: 60px 70px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
  }

  /* ── FADE INFERIOR ── garante legibilidade dos cards sobre a arte de fundo */
  .bg-fade-bottom {
    position: absolute;
    left: 0; right: 0; bottom: 0;
    height: 560px;
    background: linear-gradient(180deg, transparent 0%, rgba(4,8,12,0.5) 45%, rgba(4,8,12,0.82) 100%);
    pointer-events: none;
    z-index: 0;
  }

  /* ── HEADER ── */
  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 30px;
    position: relative;
    z-index: 1;
  }
  .logo { display: flex; align-items: baseline; gap: 6px; }
  .logo-icon { font-size: 28px; margin-right: 4px; filter: drop-shadow(0 0 8px rgba(50,160,220,0.4)); }
  .logo-trader { font-weight: 700; font-size: 34px; color: #ffffff; letter-spacing: -0.5px; }
  .logo-ai { font-weight: 700; font-size: 34px; color: #32A0DC; text-shadow: 0 0 12px rgba(50,160,220,0.3); }
  .date { font-weight: 600; font-size: 20px; color: rgba(255,255,255,0.5); letter-spacing: 0.5px; }

  /* ── TITLE + MINI CHART ROW ── */
  .title-row {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-top: 20px;
    position: relative;
    z-index: 1;
  }
  .title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 74px;
    line-height: 0.95;
    letter-spacing: 1px;
  }
  .title .line-1 { color: #ffffff; display: block; }
  .title .line-2 { color: #32A0DC; display: block; text-shadow: 0 0 30px rgba(50,160,220,0.2); }
  .mini-chart {
    width: 230px;
    height: 100px;
    flex-shrink: 0;
    margin-top: 10px;
  }
  .mini-chart svg { width: 100%; height: 100%; }

  /* ── PILLS (symbol + side) ── */
  .pills {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-top: 22px;
    margin-bottom: 24px;
    position: relative;
    z-index: 1;
  }
  .pill {
    font-weight: 700;
    font-size: 24px;
    padding: 10px 26px;
    border-radius: 30px;
    letter-spacing: 0.5px;
  }
  .pill-symbol { background: rgba(50,160,220,0.18); color: #32A0DC; border: 1.5px solid rgba(50,160,220,0.4); }
  .pill-side { border: 1.5px solid; }
  .pill-side.long  { background: rgba(74,222,128,0.18); color: #4ade80; border-color: rgba(74,222,128,0.4); }
  .pill-side.short { background: rgba(255,68,68,0.18); color: #ff4444; border-color: rgba(255,68,68,0.4); }
  .status-note {
    font-size: 17px;
    color: rgba(255,255,255,0.42);
    margin-bottom: 22px;
    position: relative;
    z-index: 1;
  }

  /* ── TRADE CARD ── */
  .trade-card {
    border: 1.5px solid rgba(50,160,220,0.18);
    border-radius: 20px;
    background: rgba(12, 20, 32, 0.8);
    position: relative;
    z-index: 1;
    box-shadow: 0 0 30px rgba(50,160,220,0.05), inset 0 0 30px rgba(50,160,220,0.02);
    margin-bottom: 26px;
  }
  .trade-row {
    display: flex;
    align-items: center;
    padding: 21px 36px;
    gap: 24px;
  }
  .trade-row + .trade-row { border-top: 1px solid rgba(255,255,255,0.07); }
  .row-badge {
    width: 54px; height: 54px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 24px;
    font-weight: 700;
    flex-shrink: 0;
  }
  .row-label {
    flex: 1;
    font-weight: 600;
    font-size: 23px;
    color: rgba(255,255,255,0.6);
    letter-spacing: 0.3px;
  }
  .row-value {
    font-weight: 800;
    font-size: 38px;
    letter-spacing: -0.5px;
  }

  /* ── CONVICTION ── */
  .conviction-wrap {
    position: relative;
    z-index: 1;
    margin-bottom: 8px;
  }
  .conviction-bar-row {
    display: flex;
    align-items: center;
    gap: 18px;
  }
  .conviction-label { font-size: 22px; font-weight: 600; color: rgba(255,255,255,0.55); letter-spacing: 0.5px; }
  .conviction-value { font-size: 30px; font-weight: 800; color: #ffffff; flex-shrink: 0; }
  .conviction-bar-bg {
    flex: 1; height: 22px;
    border-radius: 12px;
    background: rgba(255,255,255,0.08);
    overflow: hidden;
  }
  .conviction-bar-fill {
    height: 100%;
    border-radius: 12px;
    background: linear-gradient(90deg, #2882C8, #32A0DC);
    box-shadow: 0 0 14px rgba(50,160,220,0.6);
  }

  /* ── FOOTER ── */
  .footer {
    text-align: center;
    font-weight: 500;
    font-size: 18px;
    color: rgba(255,255,255,0.35);
    letter-spacing: 0.3px;
    padding-top: 28px;
    border-top: 1px solid rgba(255,255,255,0.06);
    margin-top: auto;
    position: relative;
    z-index: 1;
  }
</style>
</head>
<body>

  <div class="bg-fade-bottom"></div>

  <!-- HEADER -->
  <div class="header">
    <div class="logo">
      <span class="logo-icon">◆</span>
      <span class="logo-trader">TRADER</span>
      <span class="logo-ai">AI</span>
    </div>
    <span class="date">{{DATA_ATUAL}}</span>
  </div>

  <!-- TITLE + MINI CHART -->
  <div class="title-row">
    <div class="title"><span class="line-1">IDEIA DE</span><span class="line-2">TRADE</span></div>
    <div class="mini-chart">{{CANDLESTICK_SVG}}</div>
  </div>

  <!-- PILLS -->
  <div class="pills">
    <span class="pill pill-symbol">{{SYMBOL}}</span>
    <span class="pill pill-side {{SIDE_CLASS}}">{{SIDE}}</span>
  </div>
  <div class="status-note">{{STATUS_NOTE}}</div>

  <!-- TRADE CARD -->
  <div class="trade-card">
    <div class="trade-row">
      <div class="row-badge" style="background: rgba(50,160,220,0.15); color:#32A0DC; border:1.5px solid rgba(50,160,220,0.4);">E</div>
      <div class="row-label">PREÇO DE ENTRADA</div>
      <div class="row-value" style="color:#32A0DC;">{{ENTRY}}</div>
    </div>
    <div class="trade-row">
      <div class="row-badge" style="background: rgba(74,222,128,0.15); color:#4ade80; border:1.5px solid rgba(74,222,128,0.4);">1</div>
      <div class="row-label">ALVO 1</div>
      <div class="row-value" style="color:#4ade80;">{{TP1}}</div>
    </div>
    <div class="trade-row">
      <div class="row-badge" style="background: rgba(74,222,128,0.15); color:#4ade80; border:1.5px solid rgba(74,222,128,0.4);">2</div>
      <div class="row-label">ALVO 2</div>
      <div class="row-value" style="color:#4ade80;">{{TP2}}</div>
    </div>
    <div class="trade-row">
      <div class="row-badge" style="background: rgba(255,68,68,0.15); color:#ff4444; border:1.5px solid rgba(255,68,68,0.4);">S</div>
      <div class="row-label">STOP LOSS</div>
      <div class="row-value" style="color:#ff4444;">{{SL}}</div>
    </div>
    <div class="trade-row">
      <div class="row-badge" style="background: rgba(50,160,220,0.15); color:#32A0DC; border:1.5px solid rgba(50,160,220,0.4);">R</div>
      <div class="row-label">RISCO / RETORNO</div>
      <div class="row-value" style="color:#ffffff;">{{RR}}</div>
    </div>
  </div>

  <!-- CONVICTION -->
  <div class="conviction-wrap">
    <div class="conviction-label" style="margin-bottom: 12px;">CONVICÇÃO</div>
    <div class="conviction-bar-row">
      <div class="conviction-bar-bg">
        <div class="conviction-bar-fill" style="width: {{CONVICTION}}%;"></div>
      </div>
      <span class="conviction-value">{{CONVICTION}}%</span>
    </div>
  </div>

  <!-- FOOTER -->
  <div class="footer">Gestão de risco é tudo. Proteja seu capital.</div>

</body>
</html>
