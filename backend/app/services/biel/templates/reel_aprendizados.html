<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px; height: 1920px;
    font-family: 'Inter', 'Arial Black', sans-serif;
    background: #0a0a1a;
    color: #fff;
    overflow: hidden;
    position: relative;
  }
  .bg-gradient {
    position: absolute; inset: 0;
    background: linear-gradient(160deg, #0d0d1a 0%, #0d0d0d 45%, #0a0f1a 100%);
  }
  .bg-accent {
    position: absolute; inset: 0;
    background:
      radial-gradient(circle at 35% 30%, rgba(100,140,255,0.1) 0%, transparent 50%),
      radial-gradient(circle at 65% 70%, rgba(80,120,240,0.06) 0%, transparent 50%);
  }
  .content {
    position: relative; z-index: 2;
    display: flex; flex-direction: column;
    height: 100%; padding: 80px 60px;
  }

  /* Header */
  .header {
    flex: 0 0 auto;
    text-align: center;
    margin-top: 120px;
  }
  .header-badge {
    display: inline-block;
    background: linear-gradient(135deg, #648CFF, #4060DD);
    color: #fff;
    font-size: 28px; font-weight: 900;
    padding: 14px 40px;
    border-radius: 50px;
    letter-spacing: 4px;
    text-transform: uppercase;
    margin-bottom: 30px;
  }
  .learn-emoji {
    font-size: 100px;
    display: block;
    margin-bottom: 20px;
  }

  /* Title */
  .title-section {
    flex: 0 0 auto;
    text-align: center;
    margin-top: 30px;
    padding: 0 20px;
  }
  .title {
    font-size: 52px; font-weight: 900;
    line-height: 1.2;
    color: #648CFF;
    text-transform: uppercase;
  }

  /* Tips */
  .tips {
    flex: 1 1 auto;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 24px;
    padding: 40px 0;
  }
  .tip-card {
    background: rgba(100,140,255,0.06);
    border: 1px solid rgba(100,140,255,0.15);
    border-radius: 24px;
    padding: 36px 40px;
    display: flex;
    align-items: flex-start;
    gap: 24px;
  }
  .tip-number {
    flex: 0 0 auto;
    width: 60px; height: 60px;
    background: linear-gradient(135deg, #648CFF, #4060DD);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px; font-weight: 900;
    color: #fff;
  }
  .tip-body {
    flex: 1 1 auto;
  }
  .tip-title {
    font-size: 32px; font-weight: 900;
    color: #648CFF;
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .tip-desc {
    font-size: 26px; font-weight: 400;
    color: rgba(255,255,255,0.7);
    line-height: 1.4;
  }

  /* Key takeaway */
  .takeaway-section {
    flex: 0 0 auto;
    background: rgba(100,140,255,0.06);
    border: 1px solid rgba(100,140,255,0.15);
    border-radius: 20px;
    padding: 30px 40px;
    text-align: center;
    margin-top: 20px;
  }
  .takeaway-label {
    font-size: 22px; font-weight: 700;
    color: rgba(100,140,255,0.6);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 12px;
  }
  .takeaway-text {
    font-size: 32px; font-weight: 700;
    color: rgba(255,255,255,0.9);
    line-height: 1.3;
  }

  /* CTA */
  .cta-section {
    flex: 0 0 auto;
    text-align: center;
    padding-bottom: 100px;
    margin-top: 30px;
  }
  .cta-text {
    font-size: 36px; font-weight: 700;
    color: rgba(255,255,255,0.9);
  }
  .watermark {
    font-size: 24px; font-weight: 400;
    color: rgba(100,140,255,0.5);
    margin-top: 20px;
    letter-spacing: 3px;
  }
</style>
</head>
<body>
  <div class="bg-gradient"></div>
  <div class="bg-accent"></div>

  <div class="content">
    <div class="header" data-scene="hook">
      <span class="learn-emoji">📚</span>
      <div class="header-badge">APRENDIZADOS</div>
    </div>

    <div class="title-section" data-scene="hook">
      <div class="title">{{TITLE}}</div>
    </div>

    <div class="tips" data-scene="content">
      <div class="tip-card">
        <div class="tip-number">1</div>
        <div class="tip-body">
          <div class="tip-title">{{TIP_1_TITLE}}</div>
          <div class="tip-desc">{{TIP_1_DESC}}</div>
        </div>
      </div>
      <div class="tip-card">
        <div class="tip-number">2</div>
        <div class="tip-body">
          <div class="tip-title">{{TIP_2_TITLE}}</div>
          <div class="tip-desc">{{TIP_2_DESC}}</div>
        </div>
      </div>
      <div class="tip-card">
        <div class="tip-number">3</div>
        <div class="tip-body">
          <div class="tip-title">{{TIP_3_TITLE}}</div>
          <div class="tip-desc">{{TIP_3_DESC}}</div>
        </div>
      </div>
    </div>

    <div class="takeaway-section" data-scene="content">
      <div class="takeaway-label">Takeaway Principal</div>
      <div class="takeaway-text">{{TAKEAWAY}}</div>
    </div>

    <div class="cta-section" data-scene="cta">
      <div class="cta-text">{{CTA}}</div>
      <div class="watermark">BIEL • TRADEAI</div>
    </div>
  </div>
</body>
</html>
