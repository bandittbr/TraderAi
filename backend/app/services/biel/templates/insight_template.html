<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1350px;
    background: #0a0805;
    color: #ffffff;
    font-family: 'Inter', system-ui, sans-serif;
    padding: 60px 70px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
  }

  body::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg, #120d06 0%, #0a0805 40%, #060402 100%);
    pointer-events: none;
    z-index: 0;
  }
  .bg-grid {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(212,160,48,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(212,160,48,0.03) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none;
    z-index: 0;
  }
  .bg-glow {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 600px 400px at 50% 20%, rgba(212,160,48,0.07) 0%, transparent 70%),
      radial-gradient(ellipse 400px 300px at 85% 55%, rgba(212,160,48,0.03) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }
  .decor-line {
    position: absolute;
    left: 0; right: 0; height: 1px;
    background: linear-gradient(90deg, transparent 5%, rgba(212,160,48,0.12) 20%, rgba(212,160,48,0.12) 80%, transparent 95%);
    pointer-events: none;
    z-index: 0;
  }

  /* ── HEADER ── */
  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 30px;
    position: relative;
    z-index: 1;
  }
  .logo { display: flex; align-items: baseline; gap: 6px; }
  .logo-icon { font-size: 28px; margin-right: 4px; filter: drop-shadow(0 0 8px rgba(212,160,48,0.4)); }
  .logo-trader { font-weight: 700; font-size: 34px; color: #ffffff; letter-spacing: -0.5px; }
  .logo-ai { font-weight: 700; font-size: 34px; color: #D4A030; text-shadow: 0 0 12px rgba(212,160,48,0.3); }
  .date { font-weight: 600; font-size: 20px; color: rgba(255,255,255,0.5); letter-spacing: 0.5px; }

  /* ── TITLE ── */
  .title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 80px;
    line-height: 0.9;
    margin-top: 20px;
    letter-spacing: 1px;
    position: relative;
    z-index: 1;
  }
  .title .part-white { color: #ffffff; }
  .title .part-gold { color: #D4A030; text-shadow: 0 0 30px rgba(212,160,48,0.2); }
  .subtitle {
    font-weight: 600;
    font-size: 24px;
    color: rgba(255,255,255,0.48);
    margin-top: 10px;
    margin-bottom: 30px;
    letter-spacing: 0.5px;
    position: relative;
    z-index: 1;
  }

  /* ── INSIGHT CARDS ── */
  .insight-card {
    display: flex;
    align-items: center;
    gap: 28px;
    border: 1.5px solid rgba(212,160,48,0.18);
    border-radius: 18px;
    background: rgba(30, 25, 18, 0.65);
    padding: 28px 34px;
    margin-bottom: 20px;
    position: relative;
    z-index: 1;
    box-shadow: 0 0 22px rgba(212,160,48,0.04), inset 0 0 22px rgba(212,160,48,0.02);
  }
  .insight-icon {
    font-size: 38px;
    flex-shrink: 0;
    width: 76px;
    height: 76px;
    border-radius: 18px;
    background: rgba(212,160,48,0.16);
    border: 1.5px solid rgba(212,160,48,0.3);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .insight-title {
    font-weight: 800;
    font-size: 30px;
    color: #ffffff;
    margin-bottom: 10px;
    letter-spacing: 0.3px;
  }
  .insight-desc {
    font-weight: 400;
    font-size: 21px;
    color: rgba(255,255,255,0.55);
    line-height: 1.5;
  }

  /* ── QUOTE ── */
  .quote-block {
    border: 1.5px solid rgba(212,160,48,0.3);
    border-radius: 18px;
    background: rgba(40, 34, 26, 0.75);
    padding: 32px 38px;
    margin-top: 10px;
    display: flex;
    align-items: center;
    gap: 24px;
    position: relative;
    z-index: 1;
  }
  .quote-bar { width: 5px; align-self: stretch; background: #D4A030; border-radius: 3px; }
  .quote-mark { font-size: 52px; font-weight: 700; color: #D4A030; line-height: 1; }
  .quote-text { font-size: 26px; font-weight: 600; color: #ffffff; line-height: 1.3; }

  /* ── FOOTER ── */
  .footer {
    text-align: center;
    font-weight: 600;
    font-size: 19px;
    color: rgba(255,255,255,0.35);
    letter-spacing: 1px;
    padding-top: 28px;
    border-top: 1px solid rgba(255,255,255,0.06);
    margin-top: auto;
    position: relative;
    z-index: 1;
  }
</style>
</head>
<body>

  <div class="bg-grid"></div>
  <div class="bg-glow"></div>
  <div class="decor-line" style="top: 130px;"></div>
  <div class="decor-line" style="top: 1150px;"></div>

  <!-- HEADER -->
  <div class="header">
    <div class="logo">
      <span class="logo-icon">◆</span>
      <span class="logo-trader">TRADER</span>
      <span class="logo-ai">AI</span>
    </div>
    <span class="date">{{DATA_ATUAL}}</span>
  </div>

  <!-- TITLE -->
  <div class="title"><span class="part-white">INSIGHT</span> <span class="part-gold">AI</span></div>
  <div class="subtitle">{{QUESTION}}</div>

  <!-- INSIGHT CARDS -->
  <div class="insight-card">
    <div class="insight-icon">{{ICON_1}}</div>
    <div>
      <div class="insight-title">{{TITLE_1}}</div>
      <div class="insight-desc">{{DESC_1}}</div>
    </div>
  </div>
  <div class="insight-card">
    <div class="insight-icon">{{ICON_2}}</div>
    <div>
      <div class="insight-title">{{TITLE_2}}</div>
      <div class="insight-desc">{{DESC_2}}</div>
    </div>
  </div>
  <div class="insight-card">
    <div class="insight-icon">{{ICON_3}}</div>
    <div>
      <div class="insight-title">{{TITLE_3}}</div>
      <div class="insight-desc">{{DESC_3}}</div>
    </div>
  </div>

  <!-- QUOTE -->
  <div class="quote-block">
    <div class="quote-bar"></div>
    <div class="quote-mark">"</div>
    <div class="quote-text">{{AI_SUMMARY}}</div>
  </div>

  <!-- FOOTER -->
  <div class="footer">TRADER AI • INTELIGÊNCIA QUE GERA RESULTADOS</div>

</body>
</html>
